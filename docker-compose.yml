services:

  keycloak:
    container_name: keycloak_mcp
    image: quay.io/keycloak/keycloak:26.5.3
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak_data:/opt/keycloak/data
    restart: always

  redis-rate-limiter:
    container_name: redis-rate-limiter
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  envoy-proxy:
    container_name: envoy-proxy
    image: envoyproxy/envoy:v1.30.1
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    ports:
      - "8443:8443"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
      - spire-agent-data:/run/spire/sockets:ro
    depends_on:
      - keycloak
      - spire-agent
    restart: always

  spire-db:
    container_name: spire-db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spire
    ports:
      - "5433:5432"
    volumes:
      - ./spire-db-data:/var/lib/postgresql/data
    restart: always

  spire-server:
    container_name: spire-server
    image: ghcr.io/spiffe/spire-server:1.8.0
    command:
      - "-config"
      - "/run/spire/config/server.conf"
    volumes:
      - ./spire/server:/run/spire/config
      - spire-server-data:/run/spire/data
    ports:
      - "8081:8081"
    depends_on:
      - spire-db
    restart: always

  spire-agent:
    container_name: spire-agent
    image: ghcr.io/spiffe/spire-agent:1.8.0
    command:
      - "-config"
      - "/run/spire/config/agent.conf"
    volumes:
      - ./spire/agent:/run/spire/config
      - spire-agent-data:/opt/spire/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - spire-server
    restart: always

volumes:
  spire-server-data:
  spire-agent-data: